services:
  postgres:
    image: postgres:16-alpine
    container_name: padelhive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: padelhive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - padelhive_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d padelhive"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  padelhive_postgres_data:
